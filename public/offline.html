<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sin conexión</title>
    <style>
      body{font-family:system-ui,-apple-system,Segoe UI,Roboto,Ubuntu,Cantarell,Noto Sans,sans-serif;margin:0;background:#0f172a;color:#e2e8f0;display:flex;min-height:100vh;align-items:center;justify-content:center}
      .card{background:#111827;border:1px solid rgba(255,255,255,.08);border-radius:24px;padding:28px;max-width:520px;width:92%}
      h1{margin:0 0 10px 0;font-size:20px;letter-spacing:.3px}
      p{margin:0 0 18px 0;line-height:1.55;color:#cbd5e1}
      button{appearance:none;border:0;border-radius:14px;background:#22c55e;color:#052e16;font-weight:800;padding:12px 16px;cursor:pointer}
      button:active{transform:scale(.98)}
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Aplicación disponible, backend no responde</h1>
      <p>La interfaz está cargada desde caché. Si el servidor vuelve, podrás continuar normalmente. Si no, algunas funciones pueden usar datos locales.</p>
      <button onclick="location.reload()">Reintentar</button>
    </div>
  </body>
</html>
